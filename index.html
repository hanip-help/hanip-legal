<!DOCTYPE html>
<html lang="ko">
<head>

<title>한입 — 말로 적는 칼로리 다이어리</title>
<style>
  :root { color-scheme: light dark; }
  body {
    margin: 0; min-height: 100vh; display: grid; place-items: center;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
      "Pretendard", "Noto Sans KR", sans-serif;
    color: #1c1b18; background: #faf7f2; text-align: center;
  }
  .card { padding: 40px 24px; max-width: 420px; }
  .logo { font-size: 30px; font-weight: 800; color: #b08a4a; }
  p { color: #4a463f; font-size: 15px; line-height: 1.7; }
  .links { margin-top: 28px; display: grid; gap: 12px; }
  a { display: block; padding: 14px; border-radius: 12px; text-decoration: none;
    color: #1c1b18; background: #f1ece2; font-size: 15px; font-weight: 600; }
  @media (prefers-color-scheme: dark) {
    body { color: #ece8e1; background: #16140f; }
    p { color: #c7c2b8; } a { color: #f2efe8; background: #221f18; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">한입 🍚</div>
    <p>말하듯 적는 칼로리 다이어리</p>
    <div class="links">
      <a href="./privacy.html">개인정보처리방침</a>
